name: al_bndr
description: "Al Bndr - Booking Management System"
publish_to: 'none'
version: 1.0.0+12

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  go_router: ^15.1.2
  dart_mappable: ^4.8.0
  http: ^1.6.0
  intl: ^0.20.2
  app_platform_core:
    git:
      url: https://github.com/hassanMohammedDEV/app_platform.git
      ref: eb1d9afa768329f246b6f3f4a888e27cea227580
      path: packages/core
  app_platform_network:
    git:
      url: https://github.com/hassanMohammedDEV/app_platform.git
      ref: eb1d9afa768329f246b6f3f4a888e27cea227580
      path: packages/network
  app_platform_state:
    git:
      url: https://github.com/hassanMohammedDEV/app_platform.git
      ref: eb1d9afa768329f246b6f3f4a888e27cea227580
      path: packages/state
  app_platform_ui:
    git:
      url: https://github.com/hassanMohammedDEV/app_platform.git
      ref: eb1d9afa768329f246b6f3f4a888e27cea227580
      path: packages/ui
  shared_preferences: ^2.5.5
  mobile_scanner: ^7.2.0
  qr_flutter: ^4.1.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  dart_mappable_builder: ^4.8.0

flutter:
  uses-material-design: true
  fonts:
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
        - asset: assets/fonts/Tajawal-Medium.ttf
          weight: 500
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700
